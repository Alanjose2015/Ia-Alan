<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi ChatGPT Personal</title>
    <style>
        /* Diseño oscuro minimalista inspirado en ChatGPT */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #212121;
            color: #ececf1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 850px;
            height: 92vh;
            background-color: #2f2f2f;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background-color: #1a1a1a;
            padding: 18px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #424242;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #10a37f;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        /* Área de mensajes con scroll suave */
        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Burbujas de mensajes optimizadas */
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.98rem;
            white-space: pre-line; /* Mantiene saltos de línea del robot */
        }

        .user-message {
            background-color: #343541;
            color: #f7f7f8;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .bot-message {
            background-color: #10a37f;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .system-status {
            font-size: 0.85rem;
            color: #b3b3b3;
            font-style: italic;
            align-self: flex-start;
        }

        /* Barra de entrada de texto */
        .chat-input-area {
            background-color: #1a1a1a;
            padding: 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #424242;
        }

        .chat-input-area input {
            flex: 1;
            background-color: #343541;
            border: 1px solid #4d4d4d;
            border-radius: 10px;
            color: white;
            padding: 14px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #10a37f;
        }

        .chat-input-area button {
            background-color: #10a37f;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .chat-input-area button:hover {
            background-color: #1a7f66;
        }

        .chat-input-area button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div><span class="status-dot"></span>Mi Inteligencia Artificial</div>
            <span style="font-size: 0.85rem; color: #8e8e93;">Modelo: Llama-3</span>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">¡Hola! Soy tu ChatGPT personal de código abierto. Pregúntame lo que quieras.</div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Escribe tu pregunta aquí..." onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: Reemplaza las Xs por tu token real de Hugging Face
        const API_TOKEN = "TU_TOKEN_AQUÍ"; 
        const MODEL_URL = "https://huggingface.co";

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function sendMessage() {
            const prompt = userInput.value.trim();
            if (prompt === '') return;

            // 1. Mostrar el mensaje del usuario en pantalla
            appendMessage(prompt, 'user-message');
            userInput.value = '';
            
            // Bloquear controles mientras piensa
            userInput.disabled = true;
            sendBtn.disabled = true;

            // 2. Mostrar indicador de carga
            const loadingId = appendMessage('Pensando...', 'system-status');

            try {
                // 3. Llamada real a la API de Inteligencia Artificial
                const response = await fetch(MODEL_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: `<|begin_of_text|><|start_header_id|>user<|end_header_id|>\n\nResponde siempre en español. ${prompt}<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n`,
                        parameters: { max_new_tokens: 500, return_full_text: false }
                    })
                });

                const data = await response.json();
                
                // Quitar indicador de carga
                document.getElementById(loadingId).remove();

                if (data && data[0] && data[0].generated_text) {
                    // Limpiar texto de etiquetas técnicas si aparecen
                    let cleanText = data[0].generated_text.replace(/<\|eot_id\|>/g, '').trim();
                    appendMessage(cleanText, 'bot-message');
                } else {
                    appendMessage("Error: No recibí una respuesta clara del cerebro artificial.", 'bot-message');
                }

            } catch (error) {
                console.error(error);
                document.getElementById(loadingId).remove();
                appendMessage("Hubo un error de conexión. Asegúrate de haber colocado bien tu Token de acceso.", 'bot-message');
            } finally {
                // Desbloquear controles
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function appendMessage(text, className) {
            const messageDiv = document.createElement('div');
            const uniqueId = 'msg-' + Date.now();
            messageDiv.id = uniqueId;
            messageDiv.className = `message ${className}`;
            messageDiv.innerText = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return uniqueId;
        }
    </script>

</body>
  </html>
